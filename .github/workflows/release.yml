name: Boot Assets Release

on:
  push:
    tags:
      - "v*"
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true
        type: string
      kernel_tag:
        description: "arcbox-labs/kernel release tag to download (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ==========================================================================
  # Stage 0: Resolve version and kernel tag.
  # ==========================================================================
  resolve-vars:
    name: Resolve Build Variables
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.vars.outputs.version }}
      kernel_tag: ${{ steps.vars.outputs.kernel_tag }}

    steps:
      - name: Resolve build variables
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            # Branch push (master): use short SHA as dev version.
            VERSION="0.0.0-dev.${GITHUB_SHA::7}"
          fi

          KERNEL_TAG="${{ github.event.inputs.kernel_tag }}"
          if [ -z "$KERNEL_TAG" ]; then
            # Tag push: default to latest kernel release.
            KERNEL_TAG="latest"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "kernel_tag=$KERNEL_TAG" >> "$GITHUB_OUTPUT"

          echo "=== Resolved ==="
          echo "  version:    $VERSION"
          echo "  kernel_tag: $KERNEL_TAG"

  # ==========================================================================
  # Stage 1a: Download pre-built kernel from arcbox-labs/kernel release.
  # ==========================================================================
  download-kernel:
    name: Download Kernel (${{ matrix.arch }})
    needs: resolve-vars
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64, x86_64]

    steps:
      - name: Download kernel from arcbox-labs/kernel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KERNEL_TAG="${{ needs.resolve-vars.outputs.kernel_tag }}"
          mkdir -p staging

          if [ "$KERNEL_TAG" = "latest" ]; then
            echo "==> Downloading latest kernel release"
            gh release download --repo arcbox-labs/kernel \
              --pattern "kernel-${{ matrix.arch }}" --dir staging/
          else
            echo "==> Downloading kernel from tag: $KERNEL_TAG"
            gh release download "$KERNEL_TAG" --repo arcbox-labs/kernel \
              --pattern "kernel-${{ matrix.arch }}" --dir staging/
          fi

          ls -lh staging/
          echo "==> Kernel downloaded"

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.arch }}
          path: staging/kernel-${{ matrix.arch }}
          retention-days: 1

  # ==========================================================================
  # Stage 1b: Build EROFS rootfs (needs Docker for Alpine container +
  # mkfs.erofs for image creation).
  # ==========================================================================
  build-rootfs:
    name: Build EROFS Rootfs (${{ matrix.arch }})
    needs: resolve-vars
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: x86_64
            runner: ubuntu-24.04

    steps:
      - name: Checkout boot-assets
        uses: actions/checkout@v4

      - name: Install erofs-utils
        run: sudo apt-get update && sudo apt-get install -y erofs-utils

      - name: Build EROFS rootfs
        run: |
          chmod +x scripts/*.sh
          ./scripts/build-erofs-rootfs.sh \
            --output "$PWD/build/rootfs.erofs" \
            --arch ${{ matrix.arch }}

      - name: Upload rootfs.erofs
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-erofs-${{ matrix.arch }}
          path: build/rootfs.erofs
          retention-days: 1

  # ==========================================================================
  # Stage 2: Assemble tarball (kernel + rootfs.erofs + manifest.json).
  # ==========================================================================
  build:
    name: Assemble Boot Assets (${{ matrix.arch }})
    needs: [resolve-vars, download-kernel, build-rootfs]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64, x86_64]

    steps:
      - name: Checkout boot-assets
        uses: actions/checkout@v4

      - name: Download kernel
        uses: actions/download-artifact@v4
        with:
          name: kernel-${{ matrix.arch }}
          path: staging

      - name: Download rootfs.erofs
        uses: actions/download-artifact@v4
        with:
          name: rootfs-erofs-${{ matrix.arch }}
          path: staging

      - name: Assemble release
        id: assemble
        env:
          KERNEL_VERSION: ${{ needs.resolve-vars.outputs.kernel_tag }}
        run: |
          chmod +x scripts/*.sh

          ./scripts/build-release.sh \
            --version "${{ needs.resolve-vars.outputs.version }}" \
            --kernel "$PWD/staging/kernel-${{ matrix.arch }}" \
            --rootfs "$PWD/staging/rootfs.erofs" \
            --arch ${{ matrix.arch }} \
            --kernel-version "${{ needs.resolve-vars.outputs.kernel_tag }}" \
            --source-repo "arcbox-labs/kernel" \
            --source-ref "${{ needs.resolve-vars.outputs.kernel_tag }}" \
            --output-dir "$PWD/dist"

          TARBALL="boot-assets-${{ matrix.arch }}-v${{ needs.resolve-vars.outputs.version }}.tar.gz"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: boot-assets-release-${{ matrix.arch }}
          path: |
            dist/${{ steps.assemble.outputs.tarball }}
            dist/${{ steps.assemble.outputs.tarball }}.sha256
            dist/manifest.json
          retention-days: 14

  # ==========================================================================
  # Create GitHub Release (tag pushes only).
  # ==========================================================================
  release:
    name: Create GitHub Release
    needs: [resolve-vars, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: boot-assets-release-arm64
          path: dist

      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: boot-assets-release-x86_64
          path: dist

      - name: Publish release
        env:
          VERSION: ${{ needs.resolve-vars.outputs.version }}
        uses: softprops/action-gh-release@v2
        with:
          name: Boot Assets v${{ needs.resolve-vars.outputs.version }}
          body: |
            ## Boot Assets v${{ needs.resolve-vars.outputs.version }}

            Schema version 6 — kernel + EROFS rootfs only.

            ### Files (ARM64)
            - `boot-assets-arm64-v${{ needs.resolve-vars.outputs.version }}.tar.gz`
            - `boot-assets-arm64-v${{ needs.resolve-vars.outputs.version }}.tar.gz.sha256`

            ### Files (x86_64)
            - `boot-assets-x86_64-v${{ needs.resolve-vars.outputs.version }}.tar.gz`
            - `boot-assets-x86_64-v${{ needs.resolve-vars.outputs.version }}.tar.gz.sha256`

            - `manifest.json`
          files: dist/*
          draft: false
          prerelease: ${{ contains(needs.resolve-vars.outputs.version, 'alpha') || contains(needs.resolve-vars.outputs.version, 'beta') }}

  # ==========================================================================
  # Upload to Cloudflare R2 (CDN: dl.arcbox.dev).
  # ==========================================================================
  upload-r2:
    name: Upload to R2
    needs: [resolve-vars, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: boot-assets-release-arm64
          path: dist/arm64

      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: boot-assets-release-x86_64
          path: dist/x86_64

      - name: Prepare R2 directory structure
        run: |
          VERSION="${{ needs.resolve-vars.outputs.version }}"

          mkdir -p "r2-staging/v${VERSION}"

          for ARCH in arm64 x86_64; do
            TARBALL="boot-assets-${ARCH}-v${VERSION}.tar.gz"
            cp "dist/${ARCH}/${TARBALL}" "r2-staging/v${VERSION}/"
            cp "dist/${ARCH}/${TARBALL}.sha256" "r2-staging/v${VERSION}/"
          done
          # Use arm64 manifest as canonical (identical schema, differs only in arch field).
          cp "dist/arm64/manifest.json" "r2-staging/v${VERSION}/manifest-arm64.json"
          cp "dist/x86_64/manifest.json" "r2-staging/v${VERSION}/manifest-x86_64.json"

          printf '{"version":"%s","arm64":{"bundle":"boot-assets-arm64-v%s.tar.gz"},"x86_64":{"bundle":"boot-assets-x86_64-v%s.tar.gz"}}\n' \
            "$VERSION" "$VERSION" "$VERSION" \
            | python3 -m json.tool > "r2-staging/latest.json"

          echo "=== R2 staging ==="
          find r2-staging -type f

      - name: Upload to Cloudflare R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}
          source-dir: r2-staging
          destination-dir: boot-assets

      - name: Verify CDN
        run: |
          VERSION="${{ needs.resolve-vars.outputs.version }}"
          URL="https://dl.arcbox.dev/boot-assets/v${VERSION}/boot-assets-arm64-v${VERSION}.tar.gz.sha256"

          sleep 3
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL")
          echo "CDN check: $URL -> HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::CDN returned HTTP $HTTP_STATUS (may need DNS propagation)"
          fi
